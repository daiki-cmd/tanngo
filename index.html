<!doctype html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>単語帳アプリ</title>
	<style>
		:root {
			--bg-1: #f4efe6;
			--bg-2: #dcebe5;
			--ink: #1f2a24;
			--card: #fffaf0cc;
			--line: #203328;
			--ok: #1e8f4d;
			--ng: #b3261e;
			--accent: #d96a2b;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
			color: var(--ink);
			min-height: 100vh;
			background:
				radial-gradient(circle at 10% 10%, #ffffffaa 0%, #ffffff00 35%),
				radial-gradient(circle at 90% 80%, #ffd8b866 0%, #ffd8b800 36%),
				linear-gradient(135deg, var(--bg-1), var(--bg-2));
			display: grid;
			place-items: center;
			padding: 24px;
			padding-bottom: calc(104px + env(safe-area-inset-bottom, 0px));
			-webkit-text-size-adjust: 100%;
		}

		.app {
			width: min(980px, 100%);
			display: grid;
			gap: 16px;
			animation: rise 450ms ease-out;
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.panel {
			background: var(--card);
			border: 2px solid var(--line);
			border-radius: 18px;
			padding: 16px;
			backdrop-filter: blur(2px);
			box-shadow: 8px 8px 0 #00000020;
		}

		h1 {
			margin: 0;
			font-family: "BIZ UDPGothic", "Noto Sans JP", sans-serif;
			letter-spacing: 0.06em;
			font-size: clamp(1.3rem, 2.6vw, 2rem);
		}

		.sub {
			margin: 6px 0 0;
			font-size: 0.94rem;
			opacity: 0.85;
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
		}

		label {
			display: block;
			font-size: 0.88rem;
			margin-bottom: 6px;
			font-weight: 700;
		}

		input, button {
			width: 100%;
			font: inherit;
		}

		input {
			border: 2px solid var(--line);
			border-radius: 12px;
			padding: 10px 12px;
			background: #fff;
			font-size: 16px;
		}

		button {
			border: 2px solid var(--line);
			border-radius: 12px;
			padding: 10px 12px;
			background: #fff;
			cursor: pointer;
			font-weight: 700;
			min-height: 44px;
			touch-action: manipulation;
			-webkit-tap-highlight-color: transparent;
			transition: transform 120ms ease, background-color 120ms ease;
		}

		@media (hover: hover) {
			button:hover {
				transform: translateY(-1px);
			}
		}

		.primary {
			background: #ffe5d2;
			border-color: var(--accent);
		}

		.scope-active {
			background: #e8f6ed;
			border-color: #1e8f4d;
		}

		.danger {
			background: #ffe7e5;
		}

		.controls {
			display: flex;
			gap: 8px;
			margin-top: 10px;
			flex-wrap: wrap;
		}

		.controls button {
			width: auto;
			min-width: 140px;
			flex: 1;
		}

		.mode {
			display: flex;
			gap: 14px;
			flex-wrap: wrap;
			margin-bottom: 10px;
		}

		.mode label {
			margin: 0;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-weight: 600;
		}

		.mode input {
			width: auto;
			accent-color: var(--accent);
		}

		.quiz-card {
			border: 2px dashed var(--line);
			border-radius: 16px;
			padding: 20px 16px;
			text-align: center;
			background: #fffef9;
			min-height: 180px;
			display: grid;
			place-items: center;
			user-select: none;
			touch-action: pan-y;
			-webkit-tap-highlight-color: transparent;
			transition: transform 140ms ease;
		}

		.quiz-card.tap {
			cursor: pointer;
		}

		.quiz-card.dragging {
			transition: none;
		}

		.quiz-card.feedback-correct {
			border-color: var(--ok);
			background: #eefbf2;
			animation: correctFlash 900ms ease;
		}

		.quiz-card.feedback-wrong {
			border-color: var(--ng);
			background: #fff1f0;
			animation: wrongShake 900ms ease;
		}

		.quiz-label {
			font-size: 0.84rem;
			opacity: 0.8;
			margin-bottom: 6px;
		}

		.quiz-text {
			font-size: clamp(1.1rem, 3.4vw, 1.9rem);
			font-weight: 800;
			word-break: break-word;
		}

		.answer-area {
			margin-top: 12px;
			display: none;
			gap: 8px;
			align-items: stretch;
		}

		.answer-area.show {
			display: grid;
			grid-template-columns: 1fr auto;
		}

		.result {
			min-height: 1.4em;
			margin-top: 8px;
			font-weight: 700;
			transition: color 120ms ease;
		}

		.ok {
			color: var(--ok);
		}

		.ng {
			color: var(--ng);
		}

		@keyframes correctFlash {
			0% {
				transform: scale(1);
				box-shadow: 0 0 0 0 rgba(52, 140, 92, 0.18);
			}
			35% {
				transform: scale(1.02);
				box-shadow: 0 0 0 10px rgba(52, 140, 92, 0.08);
			}
			100% {
				transform: scale(1);
				box-shadow: 0 0 0 0 rgba(52, 140, 92, 0);
			}
		}

		@keyframes wrongShake {
			0%,
			100% {
				transform: translateX(0);
			}
			15% {
				transform: translateX(-6px);
			}
			30% {
				transform: translateX(6px);
			}
			45% {
				transform: translateX(-4px);
			}
			60% {
				transform: translateX(4px);
			}
			75% {
				transform: translateX(-2px);
			}
		}

		.list {
			margin-top: 12px;
			max-height: 220px;
			overflow: auto;
			border: 1px solid #20332844;
			border-radius: 10px;
			background: #fff;
		}

		.list.hidden {
			display: none;
		}

		.row {
			display: grid;
			grid-template-columns: 1fr 1fr auto;
			gap: 8px;
			padding: 8px 10px;
			border-top: 1px solid #20332822;
			align-items: center;
		}

		.row:first-child {
			border-top: 0;
		}

		.muted {
			opacity: 0.75;
			font-size: 0.9rem;
		}

		.selector-panel {
			margin-top: 12px;
			padding: 10px;
			border: 1px solid #20332844;
			border-radius: 10px;
			background: #fff;
		}

		.selector-panel.hidden {
			display: none;
		}

		.selector-row {
			display: grid;
			grid-template-columns: auto 1fr;
			gap: 8px;
			align-items: center;
			padding: 8px 4px;
			border-top: 1px solid #20332822;
		}

		.selector-row:first-child {
			border-top: 0;
		}

		.summary-panel {
			margin-top: 12px;
			padding: 12px;
			border: 2px solid #20332866;
			border-radius: 12px;
			background: #fff;
		}

		.summary-panel.hidden {
			display: none;
		}

		@media (max-width: 700px) {
			body {
				padding: 8px 8px calc(112px + env(safe-area-inset-bottom, 0px)) 8px;
				align-items: start;
			}

			.app {
				width: 100%;
				gap: 10px;
			}

			.panel {
				padding: 14px;
				border-radius: 14px;
			}

			.grid {
				grid-template-columns: 1fr;
			}

			.row {
				grid-template-columns: 1fr 1fr auto;
				gap: 6px;
			}

			.controls {
				gap: 6px;
			}

			.controls button {
				min-width: 0;
				padding: 10px 8px;
				font-size: 0.88rem;
			}

			.quiz-card {
				min-height: 220px;
			}

			.quiz-text {
				font-size: clamp(1.3rem, 5vw, 2rem);
			}

			.tab-bar {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				transform: none;
				width: 100%;
				padding: 8px 12px;
				padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
				background: rgba(255, 250, 240, 0.96);
				border-top: 2px solid var(--line);
				border-radius: 0;
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				box-shadow: 0 -4px 16px #00000018;
				z-index: 100;
				flex-wrap: nowrap;
			}

			.tab-btn {
				min-width: 0;
				flex: 1;
				padding: 10px 6px;
				font-size: 0.88rem;
			}
		}

		.tab-bar {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			position: fixed;
			bottom: 0;
			left: 50%;
			transform: translateX(-50%);
			width: min(980px, calc(100% - 48px));
			padding: 8px 12px;
			padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
			background: rgba(255, 250, 240, 0.96);
			border-top: 2px solid var(--line);
			border-radius: 18px 18px 0 0;
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			box-shadow: 0 -4px 16px #00000018;
			z-index: 100;
		}

		.tab-btn {
			width: auto;
			flex: 1;
			min-width: 120px;
			padding: 10px 20px;
			border: 2px solid var(--line);
			border-radius: 12px;
			background: #fff;
			cursor: pointer;
			font: inherit;
			font-weight: 700;
			transition: background-color 120ms ease, border-color 120ms ease;
		}

		.tab-btn.active {
			background: #ffe5d2;
			border-color: var(--accent);
		}

		.page {
			display: none;
		}

		.page.active {
			display: contents;
		}
	</style>
</head>
<body>
	<main class="app">
		<section class="panel">
			<div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
				<h1 style="flex: 1; min-width: 120px;">自作単語帳</h1>
			</div>
		</section>

		<div id="pageMake" class="page active">
		<section class="panel">
			<div class="grid">
				<div>
					<label for="enInput">英語</label>
					<input id="enInput" placeholder="example: apple" />
				</div>
				<div>
					<label for="jaInput">日本語</label>
					<input id="jaInput" placeholder="example: りんご" />
				</div>
			</div>
			<div class="controls">
				<button id="addBtn" class="primary">カード追加</button>
				<button id="addPoolBtn">プールから追加</button>
				<button id="toggleListBtn">全カード一覧を表示</button>
				<button id="clearBtn" class="danger">全削除</button>
			</div>
			<div class="grid" style="margin-top: 10px;">
				<div>
					<label for="poolSelect">問題プール</label>
					<select id="poolSelect" style="width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 10px 12px; background: #fff;"></select>
				</div>
				<div>
					<label for="poolNote">説明</label>
					<p id="poolNote" class="muted" style="margin: 10px 0 0;">プールを選んで「プールから追加」で登録できます。</p>
				</div>
			</div>
			<p id="count" class="muted">カード: 0件</p>
			<div id="list" class="list hidden"></div>
		</section>
		</div>

		<div id="pageStudy" class="page">
		<section class="panel">
			<div class="mode">
				<label><input type="radio" name="mode" value="en-ja" checked /> 英語 → 日本語（タップで答え）</label>
				<label><input type="radio" name="mode" value="ja-en" /> 日本語 → 英語（入力で判定）</label>
			</div>

			<div id="quizCard" class="quiz-card tap" title="タップで表/裏を切り替え">
				<div>
					<div id="quizLabel" class="quiz-label"></div>
					<div id="quizText" class="quiz-text">カードを追加してください</div>
				</div>
			</div>

			<div id="answerArea" class="answer-area">
				<input id="spellInput" placeholder="英単語を入力" />
				<button id="checkBtn" class="primary">判定</button>
			</div>
			<div id="result" class="result"></div>

			<div class="controls">
				<button id="toggleSelectorBtn">出題カードを選ぶ</button>
				<button id="nextBtn">次の問題</button>
				<button id="showBtn">答えを見る</button>
			</div>
			<p id="swipeNote" class="muted">英→日では、タップで答え表示。答え確認後に左スワイプで間違い、右スワイプで正解に仕分けできます。</p>
			<p id="bucketCount" class="muted">仕分け: 正解0件 / 間違い0件</p>
			<div class="controls">
				<button id="allScopeBtn" class="scope-active">通常出題</button>
				<button id="wrongScopeBtn">間違いだけもう一周</button>
			</div>
			<p id="scopeState" class="muted">現在: 通常出題</p>
			<div id="summaryPanel" class="summary-panel hidden">
				<p id="summaryText" class="muted">学習結果</p>
				<div class="controls" style="margin-top: 0;">
					<button id="finishRoundBtn">終了</button>
					<button id="retrySameBtn" class="primary">同じのをもう一周</button>
					<button id="retryWrongBtn">間違いだけもう一周</button>
				</div>
			</div>
			<div id="selectorPanel" class="selector-panel hidden">
				<p id="selectedCount" class="muted">出題対象: 0件</p>
				<div class="controls" style="margin-top: 0;">
					<button id="selectAllBtn">全部選択</button>
					<button id="clearSelectBtn">全部解除</button>
				</div>
				<div id="selectorList" class="list" style="max-height: 180px;"></div>
			</div>
		</section>
		</div>
	</main>

	<div class="tab-bar">
		<button id="tabMake" class="tab-btn active">単語帳を作る</button>
		<button id="tabStudy" class="tab-btn">学習する</button>
	</div>

		function loadCards() {

				const parsed = raw ? JSON.parse(raw) : [];

					return [];
				}
				return parsed
					.filter((card) => card && typeof card.en === "string" && typeof card.ja === "string")
					.map((card, index) => ({
						id: card.id || buildId(index),
						en: card.en,
						ja: card.ja
					}));
			} catch {
				return [];
			}
		}

			} catch {

			}
		}

		function createEmptyCardResults() {
			return {

				"ja-en": {}

		}

		function normalizeCardResults(raw) {
			if (!raw || typeof raw !== "object") {
				return createEmptyCardResults();
			}

			if (raw["en-ja"] || raw["ja-en"]) {
				return {
					"en-ja": raw["en-ja"] && typeof raw["en-ja"] === "object" ? raw["en-ja"] : {},
					"ja-en": raw["ja-en"] && typeof raw["ja-en"] === "object" ? raw["ja-en"] : {}
				};
			}

			return {
				"en-ja": { ...raw },
				"ja-en": { ...raw }
			};
		}

			try {
				const raw = localStorage.getItem(STORAGE_RESULTS_KEY);

				return normalizeCardResults(parsed);

				return createEmptyCardResults();
			}

                baseCards = forcedRoundIds.map((id) => map.get(id)).filter(Boolean);
            } else if (quizScope === "wrong") {

                baseCards = selectedCards.filter((card) => modeResults[card.id] === "wrong");
            } else {

            if (roundOrderIds.length === 0 || roundOrderIds.length !== baseCards.length) {
                return baseCards;

            const map = new Map(baseCards.map((card) => [card.id, card]));
            const orderedCards = roundOrderIds.map((id) => map.get(id)).filter(Boolean);
            if (orderedCards.length !== baseCards.length) {

        function shuffleCards(cardList) {

                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

            return shuffled;

			for (let i = 0; i < a.length; i += 1) {

					return false;

			}

		}

		function getCurrentQuizCard() {
			const quizCards = getQuizCards();
			if (quizCards.length === 0) {
				return null;
			}
			if (current >= quizCards.length) {
				current = 0;
			}
			return quizCards[current];
		}

		function renderBucketCount() {
			let correct = 0;
			let wrong = 0;
			Object.values(getModeResults()).forEach((status) => {
				if (status === "correct") {
					correct += 1;
				} else if (status === "wrong") {
					wrong += 1;
				}
			});
			bucketCount.textContent = `${currentMode() === "en-ja" ? "英→日" : "日→英"} 仕分け: 正解${correct}件 / 間違い${wrong}件`;
		}

		function resetCardPosition() {
			quizCard.classList.remove("dragging");
			quizCard.style.transform = "";
		}

		function clearSpellingFeedback() {
			if (spellingAdvanceTimer) {
				clearTimeout(spellingAdvanceTimer);
				spellingAdvanceTimer = null;
			}
			quizCard.classList.remove("feedback-correct", "feedback-wrong");
			checkBtn.disabled = false;
			spellInput.disabled = false;
		}

		function showSpellingFeedback(isCorrect, message, shouldAdvance, lockInput = true) {
			clearSpellingFeedback();
			quizCard.classList.add(isCorrect ? "feedback-correct" : "feedback-wrong");
			result.className = isCorrect ? "result ok" : "result ng";
			result.textContent = message;
			checkBtn.disabled = lockInput;
			spellInput.disabled = lockInput;

			if (shouldAdvance) {
				spellingAdvanceTimer = window.setTimeout(() => {
					spellingAdvanceTimer = null;
					nextCard();
				}, 1100);
			}
		}

		function classifyBySwipe(isCorrect) {
			const card = getCurrentQuizCard();
			if (!card) {
				return;
			}
			setModeResult(currentMode(), card.id, isCorrect ? "correct" : "wrong");
			saveCardResults();
			renderBucketCount();
			const isRoundDone = recordRoundAnswer(card.id, isCorrect);
			result.className = isCorrect ? "result ok" : "result ng";
			result.textContent = isCorrect ? "正解に仕分けしました" : "間違いに仕分けしました";
			if (isRoundDone) {
				renderQuiz();
				return;
			}
			nextCard();
		}

		function currentMode() {
			return document.querySelector("input[name='mode']:checked").value;
		}

		function renderList() {
			count.textContent = `カード: ${cards.length}件`;
			list.innerHTML = "";
			if (cards.length === 0) {
				list.innerHTML = '<div class="row muted">まだカードがありません</div>';
				updateListButton();
				return;
			}

			cards.forEach((card, index) => {
				const row = document.createElement("div");
				row.className = "row";

				const en = document.createElement("div");
				en.textContent = card.en;

				const ja = document.createElement("div");
				ja.textContent = card.ja;

				const del = document.createElement("button");
				del.textContent = "削除";
				del.addEventListener("click", () => {
					cards.splice(index, 1);
					selectedIds.delete(card.id);
					const quizCards = getQuizCards();
					if (current >= quizCards.length) {
						current = Math.max(0, quizCards.length - 1);
					}
					saveCards();
					saveSelectedIds();
					renderList();
					renderSelector();
					renderQuiz();
				});

				row.appendChild(en);
				row.appendChild(ja);
				row.appendChild(del);
				list.appendChild(row);
			});

			updateListButton();
		}

		function renderSelector() {
			selectorList.innerHTML = "";
			const quizCards = getQuizCards();
			selectedCount.textContent = `出題対象: ${quizCards.length}件 / 全${cards.length}件`;

			if (cards.length === 0) {
				selectorList.innerHTML = '<div class="row muted">カードがありません</div>';
				return;
			}

			cards.forEach((card) => {
				const row = document.createElement("label");
				row.className = "selector-row";

				const check = document.createElement("input");
				check.type = "checkbox";
				check.checked = selectedIds.has(card.id);
				check.addEventListener("change", () => {
					if (check.checked) {
						selectedIds.add(card.id);
					} else {
						selectedIds.delete(card.id);
					}
					saveSelectedIds();
					renderSelector();
					if (current >= getQuizCards().length) {
						current = 0;
					}
					renderQuiz();
				});

				const text = document.createElement("span");
				text.textContent = `${card.en} / ${card.ja}`;

				row.appendChild(check);
				row.appendChild(text);
				selectorList.appendChild(row);
			});
		}

		function updateListButton() {
			if (isListVisible) {
				toggleListBtn.textContent = "全カード一覧を閉じる";
			} else {
				toggleListBtn.textContent = "全カード一覧を表示";
			}
		}

		function toggleList() {
			isListVisible = !isListVisible;
			list.classList.toggle("hidden", !isListVisible);
			updateListButton();
		}

		function renderQuiz() {
			const mode = currentMode();
			const quizCards = getQuizCards();
			syncRoundProgress(quizCards);
			flipped = false;
			clearSpellingFeedback();
			result.textContent = "";
			result.className = "result";
			resetCardPosition();

			if (cards.length === 0) {
				hideSummaryPanel();
				isLearningEnded = false;
				quizLabel.textContent = "";
				quizText.textContent = "カードを追加してください";
				answerArea.classList.remove("show");
				quizCard.classList.remove("tap");
				return;
			}

			if (quizCards.length === 0) {
				hideSummaryPanel();
				quizLabel.textContent = "";
				quizText.textContent = quizScope === "wrong" ? "間違いカードがありません" : "出題カードを1件以上選んでください";
				answerArea.classList.remove("show");
				quizCard.classList.remove("tap");
				return;
			}

			if (isLearningEnded) {
				quizLabel.textContent = "";
				quizText.textContent = "学習を終了しました。再開する場合は通常出題またはもう一周を選んでください。";
				answerArea.classList.remove("show");
				quizCard.classList.remove("tap");
				return;
			}

			if (isRoundSummaryVisible) {
				quizLabel.textContent = "";
				quizText.textContent = "1周完了です。下のボタンから続け方を選んでください。";
				answerArea.classList.remove("show");
				quizCard.classList.remove("tap");
				return;
			}

			if (current >= quizCards.length) {
				current = 0;
			}

			const card = quizCards[current];

			if (mode === "en-ja") {
				quizLabel.textContent = "英語";
				quizText.textContent = card.en;
				answerArea.classList.remove("show");
				quizCard.classList.add("tap");
				swipeNote.textContent = "英→日では、タップで答え表示。答え確認後に左スワイプで間違い、右スワイプで正解に仕分けできます。";
			} else {
				quizLabel.textContent = "日本語";
				quizText.textContent = card.ja;
				answerArea.classList.add("show");
				quizCard.classList.remove("tap");
				swipeNote.textContent = "日→英モードでは入力で判定します。";
				spellInput.value = "";
				spellInput.focus();
			}
		}

		function nextCard() {
			const quizCards = getQuizCards();
			if (quizCards.length === 0) {
				return;
			}
			current = (current + 1) % quizCards.length;
			renderQuiz();
		}

		function showAnswer() {
			const quizCards = getQuizCards();
			if (quizCards.length === 0) {
				return;
			}
			const mode = currentMode();
			const card = quizCards[current];
			if (mode === "en-ja") {
				flipped = !flipped;
				quizLabel.textContent = flipped ? "日本語" : "英語";
				quizText.textContent = flipped ? card.ja : card.en;
			} else {
				result.className = "result";
				result.textContent = `答え: ${card.en}`;
			}
		}

		function checkSpelling() {
			const quizCards = getQuizCards();
			if (quizCards.length === 0 || currentMode() !== "ja-en") {
				return;
			}
			if (isQuizLocked()) {
				return;
			}

			const card = quizCards[current];
			const answer = normalize(card.en);
			const typed = normalize(spellInput.value);

			if (!typed) {
				showSpellingFeedback(false, "入力してください", false, false);
				return;
			}

			if (typed === answer) {
				setModeResult(currentMode(), card.id, "correct");
				saveCardResults();
				renderBucketCount();
				const isRoundDone = recordRoundAnswer(card.id, true);
                showSpellingFeedback(true, `正解！答え: ${card.en}`, false);
			} else {
				setModeResult(currentMode(), card.id, "wrong");
				saveCardResults();
				renderBucketCount();
				const isRoundDone = recordRoundAnswer(card.id, false);
                showSpellingFeedback(false, `不正解。正しいスペル: ${card.en}`, false);
			}
		}

		function restartWithCurrentQuizSet() {
			const quizCards = getQuizCards();
			isLearningEnded = false;
			current = 0;
			resetRoundProgress(quizCards);
			renderQuiz();
		}

		function renderPoolOptions() {
			poolSelect.innerHTML = "";
			POOLS.forEach((pool, index) => {
				const option = document.createElement("option");
				option.value = String(index);
				option.textContent = `${pool.name} (${pool.items.length}件)`;
				poolSelect.appendChild(option);
			});
			updatePoolNote();
		}

		function updatePoolNote() {
			const pool = POOLS[Number(poolSelect.value)] || POOLS[0];
			if (!pool) {
				poolNote.textContent = "プールがありません";
				return;
			}
			poolNote.textContent = `${pool.description} / 収録: ${pool.items.length}件`;
		}

		function addFromPool() {
			const pool = POOLS[Number(poolSelect.value)];
			if (!pool) {
				return;
			}

			let added = 0;
			let skipped = 0;
			pool.items.forEach((item) => {
				const exists = cards.some((card) => normalize(card.en) === normalize(item.en) && normalize(card.ja) === normalize(item.ja));
				if (exists) {
					skipped += 1;
					return;
				}
				const card = createCard(item.en, item.ja);
				cards.push(card);
				selectedIds.add(card.id);
				added += 1;
			});

			saveCards();
			saveSelectedIds();
			renderList();
			renderSelector();
			renderQuiz();
			alert(`プール追加: ${added}件追加 / ${skipped}件重複`);
		}

		function toggleSelector() {
			isSelectorVisible = !isSelectorVisible;
			selectorPanel.classList.toggle("hidden", !isSelectorVisible);
			toggleSelectorBtn.textContent = isSelectorVisible ? "出題カード選択を閉じる" : "出題カードを選ぶ";
		}

		addBtn.addEventListener("click", () => {
			const en = enInput.value.trim();
			const ja = jaInput.value.trim();
			if (!en || !ja) {
				alert("英語と日本語の両方を入力してください");
				return;
			}

			if (isDuplicateCard(en, ja)) {
				alert("同じカードがすでに登録されています");
				return;
			}

			const card = createCard(en, ja);
			cards.push(card);
			selectedIds.add(card.id);
			forcedRoundIds = null;
			isLearningEnded = false;
			saveCards();
			saveSelectedIds();
			enInput.value = "";
			jaInput.value = "";
			current = Math.max(0, getQuizCards().length - 1);
			renderList();
			renderSelector();
			renderQuiz();
			enInput.focus();
		});

		clearBtn.addEventListener("click", () => {
			if (!cards.length) {
				return;
			}
			if (!confirm("カードをすべて削除しますか？")) {
				return;
			}
			cards = [];
			selectedIds = new Set();
			cardResults = createEmptyCardResults();
			current = 0;
			forcedRoundIds = null;
			roundOrderIds = [];
			roundAnsweredIds = new Set();
			roundCorrect = 0;
			roundWrong = 0;
			lastCompletedRoundIds = [];
			isRoundSummaryVisible = false;
			isLearningEnded = false;
			isListVisible = false;
			isSelectorVisible = false;
			list.classList.add("hidden");
			selectorPanel.classList.add("hidden");
			toggleSelectorBtn.textContent = "出題カードを選ぶ";
			saveCards();
			saveSelectedIds();
			saveCardResults();
			renderList();
			renderSelector();
			renderBucketCount();
			renderQuiz();
		});

		addPoolBtn.addEventListener("click", addFromPool);
		poolSelect.addEventListener("change", updatePoolNote);
		toggleListBtn.addEventListener("click", toggleList);
		toggleSelectorBtn.addEventListener("click", toggleSelector);
		selectAllBtn.addEventListener("click", () => {
			forcedRoundIds = null;
			isLearningEnded = false;
			cards.forEach((card) => selectedIds.add(card.id));
			saveSelectedIds();
			renderSelector();
			renderQuiz();
		});
		clearSelectBtn.addEventListener("click", () => {
			forcedRoundIds = null;
			isLearningEnded = false;
			selectedIds.clear();
			saveSelectedIds();
			current = 0;
			renderSelector();
			renderQuiz();
		});
		allScopeBtn.addEventListener("click", () => setQuizScope("all"));
		wrongScopeBtn.addEventListener("click", () => setQuizScope("wrong"));
		nextBtn.addEventListener("click", nextCard);
		showBtn.addEventListener("click", showAnswer);
		checkBtn.addEventListener("click", checkSpelling);

		spellInput.addEventListener("keydown", (event) => {
			if (event.key === "Enter") {
				checkSpelling();
			}
		});

		quizCard.addEventListener("click", () => {
			if (isQuizLocked()) {
				return;
			}
			if (ignoreNextClick) {
				ignoreNextClick = false;
				return;
			}
			if (currentMode() === "en-ja") {
				showAnswer();
			}
		});

		quizCard.addEventListener("pointerdown", (event) => {
			if (isQuizLocked()) {
				return;
			}
			if (event.button !== 0 || currentMode() !== "en-ja") {
				return;
			}
			if (!getCurrentQuizCard()) {
				return;
			}
			dragState = { startX: event.clientX, moved: false, pointerId: event.pointerId };
			quizCard.setPointerCapture(event.pointerId);
		});

		quizCard.addEventListener("pointermove", (event) => {
			if (isQuizLocked()) {
				return;
			}
			if (!dragState || dragState.pointerId !== event.pointerId || currentMode() !== "en-ja") {
				return;
			}
			const deltaX = event.clientX - dragState.startX;
			if (Math.abs(deltaX) > 6) {
				dragState.moved = true;
				quizCard.classList.add("dragging");
				quizCard.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.03}deg)`;
			}
		});

		quizCard.addEventListener("pointerup", (event) => {
			if (isQuizLocked()) {
				return;
			}
			if (!dragState || dragState.pointerId !== event.pointerId || currentMode() !== "en-ja") {
				return;
			}
			const deltaX = event.clientX - dragState.startX;
			const swiped = Math.abs(deltaX) >= 90;
			if (dragState.moved) {
				ignoreNextClick = true;
			}
			resetCardPosition();
			dragState = null;

			if (!swiped) {
				return;
			}

			if (!flipped) {
				showAnswer();
				return;
			}

			classifyBySwipe(deltaX > 0);
		});

		quizCard.addEventListener("pointercancel", () => {
			dragState = null;
			resetCardPosition();
		});

		finishRoundBtn.addEventListener("click", () => {
			forcedRoundIds = null;
			isLearningEnded = true;
			hideSummaryPanel();
			renderQuiz();
		});

		retrySameBtn.addEventListener("click", () => {
			if (!lastCompletedRoundIds.length) {
				return;
			}
			forcedRoundIds = [...lastCompletedRoundIds];
			isLearningEnded = false;
			restartWithCurrentQuizSet();
		});

		retryWrongBtn.addEventListener("click", () => {
			forcedRoundIds = null;
			setQuizScope("wrong");
			isLearningEnded = false;
			restartWithCurrentQuizSet();
		});

		modeRadios.forEach((radio) => {
			radio.addEventListener("change", renderQuiz);
		});

		renderPoolOptions();
		syncSelection();
		renderList();
		renderSelector();
		renderBucketCount();
		updateScopeUI();
		updateListButton();
		renderQuiz();

		const tabMake = document.getElementById("tabMake");
		const tabStudy = document.getElementById("tabStudy");
		const pageMake = document.getElementById("pageMake");
		const pageStudy = document.getElementById("pageStudy");

		function switchTab(tabName) {
			const isMake = tabName === "make";
			pageMake.classList.toggle("active", isMake);
			pageStudy.classList.toggle("active", !isMake);
			tabMake.classList.toggle("active", isMake);
			tabStudy.classList.toggle("active", !isMake);
			if (!isMake) {
				renderQuiz();
			}
		}

		tabMake.addEventListener("click", () => switchTab("make"));
		tabStudy.addEventListener("click", () => switchTab("study"));
	</script>

	<script>
		(() => {
			const DECKS_KEY = "tanngo_saved_decks_v1";
			const UNLOCK_KEY = "tanngo_unlocked_v1";

			const style = document.createElement("style");
			style.textContent = `
				.deck-save-box { margin-top: 12px; padding: 12px; border: 2px solid #20332866; border-radius: 12px; background: #fff; }
				.deck-save-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
				.deck-save-row button { width: auto; min-width: 150px; }
				.lock-screen { position: fixed; inset: 0; z-index: 10000; display: grid; place-items: center; padding: 20px; background: linear-gradient(135deg, var(--bg-1), var(--bg-2)); }
				.lock-box { width: min(420px, 100%); padding: 24px; border: 2px solid var(--line); border-radius: 18px; background: #fffaf0; box-shadow: 8px 8px 0 #00000020; }
				.lock-box h2 { margin: 0 0 8px; }
				.lock-box p { margin: 0 0 14px; }
				.lock-error { min-height: 1.4em; margin-top: 8px !important; color: var(--ng); font-weight: 700; }
				@media (max-width: 600px) { .deck-save-row { grid-template-columns: 1fr; } .deck-save-row button { width: 100%; } }
			`;
			document.head.appendChild(style);

			function loadDecks() {
				try {
					const value = JSON.parse(localStorage.getItem(DECKS_KEY) || "[]");
					return Array.isArray(value) ? value : [];
				} catch (_) {
					return [];
				}
			}

			function saveDecks(decks) {
				localStorage.setItem(DECKS_KEY, JSON.stringify(decks));
			}

			function appendSavedDeckOptions() {
				poolSelect.querySelectorAll('option[data-saved-deck="true"]').forEach((option) => option.remove());
				loadDecks().forEach((deck) => {
					const option = document.createElement("option");
					option.value = `saved:${deck.id}`;
					option.dataset.savedDeck = "true";
					option.textContent = `${deck.name}（保存済み・${deck.items.length}件）`;
					poolSelect.appendChild(option);
				});
			}

			const saveBox = document.createElement("div");
			saveBox.className = "deck-save-box";
			saveBox.innerHTML = `
				<div class="deck-save-row">
					<div><label for="deckNameInput">単語帳の名前</label><input id="deckNameInput" placeholder="例：定期テスト Unit 1" maxlength="60"></div>
					<button id="saveDeckBtn" class="primary">単語帳を保存</button>
				</div>
				<p id="saveDeckMessage" class="muted" style="margin:8px 0 0;">現在のカードを名前付きで問題プールに保存します。</p>
			`;
			count.parentNode.insertBefore(saveBox, count);

			const deckNameInput = document.getElementById("deckNameInput");
			const saveDeckMessage = document.getElementById("saveDeckMessage");
			document.getElementById("saveDeckBtn").addEventListener("click", () => {
				const name = deckNameInput.value.trim();
				if (!name) {
					alert("単語帳の名前を入力してください。");
					deckNameInput.focus();
					return;
				}
				if (!cards.length) {
					alert("保存するカードがありません。");
					return;
				}

				const decks = loadDecks();
				const sameNameIndex = decks.findIndex((deck) => deck.name === name);
				const deck = {
					id: sameNameIndex >= 0 ? decks[sameNameIndex].id : `deck_${Date.now()}_${Math.random().toString(36).slice(2)}`,
					name,
					items: cards.map(({ en, ja }) => ({ en, ja })),
					updatedAt: new Date().toISOString()
				};

				if (sameNameIndex >= 0) {
					if (!confirm(`「${name}」を現在の内容で上書きしますか？`)) return;
					decks[sameNameIndex] = deck;
				} else {
					decks.push(deck);
				}

				saveDecks(decks);
				appendSavedDeckOptions();
				poolSelect.value = `saved:${deck.id}`;
				poolNote.textContent = `保存した単語帳「${name}」 / カード数: ${deck.items.length}件`;
				saveDeckMessage.textContent = `「${name}」を保存しました。`;
			});

			poolSelect.addEventListener("change", () => {
				if (!poolSelect.value.startsWith("saved:")) return;
				const deck = loadDecks().find((item) => `saved:${item.id}` === poolSelect.value);
				if (deck) poolNote.textContent = `保存した単語帳「${deck.name}」 / カード数: ${deck.items.length}件`;
			});

			addPoolBtn.addEventListener("click", () => {
				if (!poolSelect.value.startsWith("saved:")) return;
				const deck = loadDecks().find((item) => `saved:${item.id}` === poolSelect.value);
				if (!deck) return;
				let added = 0;
				let skipped = 0;
				deck.items.forEach((item) => {
					if (cards.some((card) => normalize(card.en) === normalize(item.en) && normalize(card.ja) === normalize(item.ja))) {
						skipped += 1;
						return;
					}
					const card = createCard(item.en, item.ja);
					cards.push(card);
					selectedIds.add(card.id);
					added += 1;
				});
				saveCards();
				saveSelectedIds();
				renderList();
				renderSelector();
				renderQuiz();
				alert(`「${deck.name}」から ${added}件追加しました（重複 ${skipped}件）。`);
			});

			appendSavedDeckOptions();

			if (sessionStorage.getItem(UNLOCK_KEY) !== "ok") {
				const lockScreen = document.createElement("div");
				lockScreen.className = "lock-screen";
				lockScreen.innerHTML = `
					<form class="lock-box" id="passwordForm">
						<h2>単語帳アプリ</h2>
						<p>使用するにはパスワードを入力してください。</p>
						<label for="passwordInput">パスワード</label>
						<input id="passwordInput" type="password" autocomplete="current-password" autofocus>
						<button class="primary" type="submit" style="margin-top:10px;">開く</button>
						<p id="passwordError" class="lock-error" aria-live="polite"></p>
					</form>
				`;
				document.body.appendChild(lockScreen);
				const passwordInput = document.getElementById("passwordInput");
				document.getElementById("passwordForm").addEventListener("submit", (event) => {
					event.preventDefault();
					if (passwordInput.value === "miraoto") {
						sessionStorage.setItem(UNLOCK_KEY, "ok");
						lockScreen.remove();
					} else {
						document.getElementById("passwordError").textContent = "パスワードが違います。";
						passwordInput.select();
					}
				});
			}
		})();
	</script>
</body>
